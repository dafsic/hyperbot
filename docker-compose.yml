services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hyperbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-hyperbot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hyperbot} -d ${POSTGRES_DB:-hyperbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HYPERBOT_PRIVATE_KEY: ${HYPERBOT_PRIVATE_KEY}
      HYPERBOT_NETWORK: ${HYPERBOT_NETWORK:-testnet}
      DATABASE_URL: ${DATABASE_URL:-******postgres:5432/hyperbot}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      # Mount your real config; copy config.example.toml to config.toml first.
      - ./config.toml:/app/config.toml:ro

volumes:
  pgdata:
